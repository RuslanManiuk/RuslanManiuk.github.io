<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакти</title>
  <link rel="stylesheet" href="../project_css/contacts.css">
  <link rel="stylesheet" href="../project_css/style.css">
</head>
<body>
<header class="header">
  <div class="container">
    <div class="header_inner">
      <div class="header_logo">RuMa</div>
      <nav class="nav">
        <a class="nav_item" href="index.html">Головна</a>
        <a class="nav_item" href="apartment.html">Доступні квартири</a>
        <a class="nav_item" href="my_reservation.html">Мої бронювання</a>
        <a class="nav_item" href="contacts.html">Контакти</a>
      </nav>
    </div>
  </div>
</header>

<section class="contacts-section">
  <div class="container">
    <h2 class="section-title">Контакти</h2>
    <div class="contacts-grid">
      <div class="contact-card">
        <h3>Адреса</h3>
        <p>вул. Хрещатик, 22, Київ, Україна</p>
      </div>
      <div class="contact-card">
        <h3>Телефон</h3>
        <p>+38 044 123 45 67</p>
      </div>
      <div class="contact-card">
        <h3>Email</h3>
        <p>info@mysite.ua</p>
      </div>
      <div class="contact-card">
        <h3>Графік роботи</h3>
        <p>Пн-Пт: 09:00 - 18:00</p>
        <p>Сб-Нд: Вихідний</p>
      </div>
    </div>
  </div>
</section>

<section class="contact-form-section">
  <div class="container">
    <h2 class="section-title">Зв'яжіться з нами</h2>
    <form class="contact-form">
      <div class="form-group">
        <label for="name">Ім'я</label>
        <input id="name" type="text" required>
      </div>
      <div class="form-group">
        <label for="email">Ел. адреса</label>
        <input id="email" type="email" required>
      </div>
      <div class="form-group">
        <label for="message">Повідомлення</label>
        <textarea id="message" rows="4" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Надіслати</button>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <p>&copy; 2025 RuMa. Всі права захищені.</p>
  </div>
</footer>
</body>
</html>
